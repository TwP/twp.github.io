{{- $compad := resources.Get "css/compad.css" -}}
{{- if hugo.IsDevelopment -}}
  <link rel="stylesheet" href="{{ $compad.RelPermalink }}">
{{- else -}}
  {{- with $compad | minify | fingerprint -}}
    <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}" crossorigin="anonymous">
  {{- end -}}
{{- end -}}
