{{ define "header-middle" -}}
<div class="header-title">{{ .Site.Title }}</div>
{{- end }}

{{ define "main" -}}
{{ range .Site.RegularPages -}}
<article class="post-summary">
  <h1 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h1>
  <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z0700" }}" class="post-date">{{ .Date.Format "Jan 2, 2006" }}</time>
  {{ .Summary }}
  {{ if .Truncated }}
  <p class="read-more"><a href="{{ .RelPermalink }}">Read More&hellip;</a></p>
  {{ end }}
</article>
{{- end }}
{{- end }}
